<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Open Graph (Social Media) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Character Card Demo">
    <meta property="og:description" content="A simple character card with health and leveling mechanics.">
    <meta property="og:url" content="https://yourURLofPage.here">
    <meta property="og:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Character Card Demo">
    <meta name="twitter:description" content="A simple character card with health and leveling mechanics.">
    <meta name="twitter:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico">

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">

    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">


    <title>Character Card</title>
</head>
<body>

<div class="card">

    <div class="card-image">
        <img src="character.png" alt="Character Image">
    </div>

    <div class="card-title">
        <span id="char-name"></span>
    </div>

    <div class="card-bottom">
        <p><strong>Class:</strong> <span id="char-class"></span></p>
        <p><strong>Level:</strong> <span id="char-level"></span></p>
        <p><strong>Health:</strong> <span id="char-health"></span></p>

        <div class="buttons">
            <button onclick="character.attacked()">Attack</button>
            <button onclick="character.levelUp()">Level Up</button>
        </div>
    </div>

</div>

</body>
</html>
